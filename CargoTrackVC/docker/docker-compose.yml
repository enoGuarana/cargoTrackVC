services:
  cargotrack-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cargotrack-vc-api
    ports:
      - "8000:8000"
    environment:
      - DTE_CONFIG_PATH=/app/config/settings.yaml
      - DATABASE_URL=postgresql+psycopg2://cargotrack:cargotrack_password@postgres:5432/cargotrack_vc
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CERT_PATH=/app/tests/fixtures/test_cert.pem
      - KEY_PATH=/app/tests/fixtures/test_key.pem
      - PYTHONPATH=/app/src
    volumes:
      - cargotrack-logs:/var/log/cargotrack-vc
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cargotrack-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  cargotrack-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: cargotrack-vc-worker
    command: >
      bash -c "
        sleep 10 &&
        celery -A dte_mvp.infra.queue.celery_app worker --loglevel=info
      "
    environment:
      - DTE_CONFIG_PATH=/app/config/settings.yaml
      - DATABASE_URL=postgresql+psycopg2://cargotrack:cargotrack_password@postgres:5432/cargotrack_vc
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CERT_PATH=/app/tests/fixtures/test_cert.pem
      - KEY_PATH=/app/tests/fixtures/test_key.pem
      - PYTHONPATH=/app/src
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - cargotrack-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: cargotrack-vc-postgres
    environment:
      - POSTGRES_USER=cargotrack
      - POSTGRES_PASSWORD=cargotrack_password
      - POSTGRES_DB=cargotrack_vc
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - cargotrack-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cargotrack -d cargotrack_vc" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cargotrack-vc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - cargotrack-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: cargotrack-vc-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - cargotrack-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  cargotrack-logs:

networks:
  cargotrack-network:
    driver: bridge

